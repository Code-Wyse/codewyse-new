name: SEO Schema Validate

on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/seo/validate-schema.mjs"
      - ".github/workflows/seo-schema-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate inline JSON-LD
        run: node scripts/seo/validate-schema.mjs
