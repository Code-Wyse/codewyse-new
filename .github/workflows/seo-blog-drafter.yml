name: SEO Blog Drafter

on:
  schedule:
    # Every Monday 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      auto_merge:
        description: "Enable auto-merge on the drafted PR (defaults to true)"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install runtime deps for the drafter
        run: npm install openai@^4.67.0 --no-save

      - name: Run drafter
        id: draft
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
        run: node scripts/seo/draft-post.mjs

      - name: Sanity-check the drafted post
        run: node scripts/seo/sanity-check-post.mjs "${{ steps.draft.outputs.outpath }}"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: seo/draft-${{ steps.draft.outputs.slug }}
          base: main
          commit-message: 'seo: draft "${{ steps.draft.outputs.keyword }}"'
          title: 'seo: draft "${{ steps.draft.outputs.keyword }}"'
          body: |
            ## Auto-drafted SEO post

            **Keyword:** `${{ steps.draft.outputs.keyword }}`
            **File:** `${{ steps.draft.outputs.outpath }}`

            ### Auto-merge
            This PR has auto-merge enabled. It will merge automatically once the
            following checks pass:

            - SEO Lighthouse CI
            - SEO Schema Validate

            If any check fails, the PR stays open for human review.

            ### Manual reviewer checklist (when auto-merge is disabled)
            - [ ] Title (≤ 60 chars) and meta description (≤ 155 chars) read well
            - [ ] No hallucinated stats, library names, or external links
            - [ ] Code blocks compile / are correct
            - [ ] Internal links point to real routes (`/services`, `/projects`, `/support`)
            - [ ] Voice matches Codewyse (no AI cliches)
            - [ ] OG image generated and saved to `public/images/blog/og-${{ steps.draft.outputs.slug }}.jpg`
            - [ ] Add entry to `components/Blog/blogData.tsx` once content is approved

            Generated by `.github/workflows/seo-blog-drafter.yml`.
          labels: |
            seo
            automated
          delete-branch: true

      - name: Enable auto-merge
        if: |
          steps.cpr.outputs.pull-request-number &&
          (github.event_name == 'schedule' ||
           github.event.inputs.auto_merge != 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
          echo "Auto-merge enabled on PR #${{ steps.cpr.outputs.pull-request-number }}."
          echo "Merge will fire once required CI checks pass."
