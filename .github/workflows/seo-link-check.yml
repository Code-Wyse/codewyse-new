name: SEO Broken Link Sweep

on:
  schedule:
    # Every Wednesday 07:00 UTC, against the live site
    - cron: "0 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install linkinator
        run: npm install -g linkinator

      - name: Crawl https://codewyse.io and collect broken links
        id: crawl
        run: |
          set +e
          linkinator https://codewyse.io \
            --recurse \
            --skip "linkedin.com|x.com|twitter.com|instagram.com|github.com|calendly.com" \
            --format json > link-report.json
          echo "exit=$?" >> $GITHUB_OUTPUT

      - name: Open issue if broken links found
        if: steps.crawl.outputs.exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('link-report.json', 'utf8'));
            const broken = (report.links || []).filter(l => l.state === 'BROKEN');
            if (broken.length === 0) return;

            // Stable marker so we can find the single tracking issue across runs.
            const MARKER = '<!-- seo-link-check -->';
            const title = `seo: ${broken.length} broken link(s) on codewyse.io`;
            const body = [
              MARKER,
              '### Broken links detected on codewyse.io',
              '',
              `Found **${broken.length}** broken link(s) (last checked ${new Date().toISOString()}):`,
              '',
              ...broken.slice(0, 50).map(l => `- \`${l.status}\` ${l.url}\n  on: ${l.parent || '(unknown)'}`),
              '',
              broken.length > 50 ? `_+ ${broken.length - 50} more — see workflow artifacts._` : '',
              '',
              'Generated by `.github/workflows/seo-link-check.yml`.',
            ].join('\n');

            // Look for an existing open issue created by this workflow.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seo,automated',
              per_page: 100,
            });
            const tracking = existing.find(i => !i.pull_request && (i.body || '').includes(MARKER));

            if (tracking) {
              // Update the existing issue in place instead of opening a duplicate.
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracking.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['seo', 'automated', 'bug'],
                body,
              });
            }

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: link-report.json
