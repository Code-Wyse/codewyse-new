name: SEO Broken Link Sweep

on:
  schedule:
    # Every Wednesday 07:00 UTC, against the live site
    - cron: "0 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install linkinator
        run: npm install -g linkinator

      - name: Crawl https://codewyse.io and collect broken links
        id: crawl
        run: |
          set +e
          linkinator https://codewyse.io \
            --recurse \
            --skip "linkedin.com|x.com|twitter.com|instagram.com|github.com|calendly.com" \
            --format json > link-report.json
          echo "exit=$?" >> $GITHUB_OUTPUT

      - name: Open issue if broken links found
        if: steps.crawl.outputs.exit != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('link-report.json', 'utf8'));
            const broken = (report.links || []).filter(l => l.state === 'BROKEN');
            if (broken.length === 0) return;

            const body = [
              '### Broken links detected on codewyse.io',
              '',
              `Found **${broken.length}** broken link(s):`,
              '',
              ...broken.slice(0, 50).map(l => `- \`${l.status}\` ${l.url}\n  on: ${l.parent || '(unknown)'}`),
              '',
              broken.length > 50 ? `_+ ${broken.length - 50} more — see workflow artifacts._` : '',
              '',
              'Generated by `.github/workflows/seo-link-check.yml`.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `seo: ${broken.length} broken link(s) on codewyse.io`,
              labels: ['seo', 'automated', 'bug'],
              body,
            });

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: link-report.json
